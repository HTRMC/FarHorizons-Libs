name: Build Dependencies

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(cat .zigversion)" >> $GITHUB_ENV

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build headers
        run: zig build headers

      - name: Package headers
        run: |
          cd zig-out
          tar -czvf ../farhorizons_deps_headers.tar.gz include/

      - uses: actions/upload-artifact@v4
        with:
          name: headers
          path: farhorizons_deps_headers.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(Get-Content .zigversion)" >> $env:GITHUB_ENV

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            git
            python3

      - name: Clone and build shaderc
        shell: msys2 {0}
        run: |
          git clone https://github.com/google/shaderc.git shaderc-src
          cd shaderc-src
          ./utils/git-sync-deps
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DSHADERC_SKIP_TESTS=ON \
                -DSHADERC_SKIP_EXAMPLES=ON \
                -DSPIRV_SKIP_TESTS=ON \
                ..
          ninja shaderc_combined
          # Copy to the expected location
          mkdir -p ../../shaderc/lib/x86_64-windows-gnu
          cp libshaderc/libshaderc_combined.a ../../shaderc/lib/x86_64-windows-gnu/

      - name: Clone and build FastNoise2
        shell: msys2 {0}
        run: |
          # Use Clang for libc++ ABI compatibility with Zig
          git clone --depth 1 https://github.com/Auburn/FastNoise2.git fastnoise2-src
          cd fastnoise2-src
          mkdir build && cd build

          # Run cmake configure first (this fetches FastSIMD dependency)
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DBUILD_SHARED_LIBS=OFF \
                -DFASTNOISE2_TESTS=OFF \
                -DFASTNOISE2_TOOLS=OFF \
                .. || true

          # Patch ClassSIMD.cmake to skip GCC-only assembler flag for Clang
          # The -Wa,-muse-unaligned-vector-move flag is only supported by GCC
          # FastSIMD is fetched to _deps during configure
          sed -i 's/if(MINGW)/if(MINGW AND CMAKE_CXX_COMPILER_ID STREQUAL "GNU")/' \
            _deps/fastsimd-src/dispatch/cmake/ClassSIMD.cmake

          # Re-run cmake after patching
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DBUILD_SHARED_LIBS=OFF \
                -DFASTNOISE2_TESTS=OFF \
                -DFASTNOISE2_TOOLS=OFF \
                ..

          ninja FastNoise
          # Copy to the expected location (v1.1.0+ outputs to Release/lib/)
          mkdir -p ../../fastnoise2/lib/x86_64-windows-gnu
          cp Release/lib/libFastNoise.a ../../fastnoise2/lib/x86_64-windows-gnu/

      - name: Build x86_64-windows
        run: zig build -Dtarget=x86_64-windows-gnu

      - name: List output
        shell: bash
        run: find zig-out -type f

      - name: Package
        shell: bash
        run: |
          cd zig-out/lib
          tar -czvf ../../farhorizons_deps_x86_64-windows-gnu.tar.gz farhorizons_deps_x86_64-windows-gnu/

      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-windows-gnu
          path: farhorizons_deps_x86_64-windows-gnu.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(cat .zigversion)" >> $GITHUB_ENV

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            clang libc++-dev libc++abi-dev cmake ninja-build python3

      - name: Clone and build shaderc
        run: |
          git clone https://github.com/google/shaderc.git shaderc-src
          cd shaderc-src
          ./utils/git-sync-deps
          mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADERC_SKIP_TESTS=ON \
            -DSHADERC_SKIP_EXAMPLES=ON \
            -DSHADERC_SKIP_COPYRIGHT_CHECK=ON \
            -DSPIRV_SKIP_TESTS=ON \
            -DSPIRV_WERROR=OFF \
            ..
          ninja
          mkdir -p ../../shaderc/lib/x86_64-linux-gnu
          cp libshaderc/libshaderc_combined.a ../../shaderc/lib/x86_64-linux-gnu/

      - name: Clone and build FastNoise2
        run: |
          git clone --depth 1 https://github.com/Auburn/FastNoise2.git fastnoise2-src
          cd fastnoise2-src
          mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DFASTNOISE2_TESTS=OFF \
            -DFASTNOISE2_TOOLS=OFF \
            ..
          ninja FastNoise
          mkdir -p ../../fastnoise2/lib/x86_64-linux-gnu
          cp Release/lib/libFastNoise.a ../../fastnoise2/lib/x86_64-linux-gnu/

      - name: Generate Wayland protocol headers
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/wayland/wayland-protocols.git wl-protocols
          mkdir -p wayland-generated
          WP=wl-protocols
          gen() { wayland-scanner client-header "$1" "$2"; wayland-scanner private-code "$1" "${2%.h}-code.h"; }
          # Core Wayland protocol
          gen /usr/share/wayland/wayland.xml wayland-generated/wayland-client-protocol.h
          # Extension protocols
          gen $WP/stable/xdg-shell/xdg-shell.xml wayland-generated/xdg-shell-client-protocol.h
          gen $WP/unstable/xdg-decoration/xdg-decoration-unstable-v1.xml wayland-generated/xdg-decoration-unstable-v1-client-protocol.h
          gen $WP/stable/viewporter/viewporter.xml wayland-generated/viewporter-client-protocol.h
          gen $WP/unstable/relative-pointer/relative-pointer-unstable-v1.xml wayland-generated/relative-pointer-unstable-v1-client-protocol.h
          gen $WP/unstable/pointer-constraints/pointer-constraints-unstable-v1.xml wayland-generated/pointer-constraints-unstable-v1-client-protocol.h
          gen $WP/unstable/idle-inhibit/idle-inhibit-unstable-v1.xml wayland-generated/idle-inhibit-unstable-v1-client-protocol.h
          gen $WP/staging/xdg-activation/xdg-activation-v1.xml wayland-generated/xdg-activation-v1-client-protocol.h
          gen $WP/staging/fractional-scale/fractional-scale-v1.xml wayland-generated/fractional-scale-v1-client-protocol.h
          ls -la wayland-generated/

      - name: Build x86_64-linux-gnu
        run: zig build -Dtarget=x86_64-linux-gnu

      - name: Package
        run: |
          cd zig-out/lib
          tar -czvf ../../farhorizons_deps_x86_64-linux-gnu.tar.gz farhorizons_deps_x86_64-linux-gnu/

      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-linux-gnu
          path: farhorizons_deps_x86_64-linux-gnu.tar.gz

  build-linux-aarch64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(cat .zigversion)" >> $GITHUB_ENV

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            clang libc++-dev libc++abi-dev cmake ninja-build python3

      - name: Clone and build shaderc
        run: |
          git clone https://github.com/google/shaderc.git shaderc-src
          cd shaderc-src
          ./utils/git-sync-deps
          mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DSHADERC_SKIP_TESTS=ON \
            -DSHADERC_SKIP_EXAMPLES=ON \
            -DSHADERC_SKIP_COPYRIGHT_CHECK=ON \
            -DSPIRV_SKIP_TESTS=ON \
            -DSPIRV_WERROR=OFF \
            ..
          ninja
          mkdir -p ../../shaderc/lib/aarch64-linux-gnu
          cp libshaderc/libshaderc_combined.a ../../shaderc/lib/aarch64-linux-gnu/

      - name: Clone and build FastNoise2
        run: |
          git clone --depth 1 https://github.com/Auburn/FastNoise2.git fastnoise2-src
          cd fastnoise2-src
          mkdir build && cd build
          cmake -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++ -lc++abi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DFASTNOISE2_TESTS=OFF \
            -DFASTNOISE2_TOOLS=OFF \
            ..
          ninja FastNoise
          mkdir -p ../../fastnoise2/lib/aarch64-linux-gnu
          cp Release/lib/libFastNoise.a ../../fastnoise2/lib/aarch64-linux-gnu/

      - name: Generate Wayland protocol headers
        run: |
          git clone --depth 1 https://gitlab.freedesktop.org/wayland/wayland-protocols.git wl-protocols
          mkdir -p wayland-generated
          WP=wl-protocols
          gen() { wayland-scanner client-header "$1" "$2"; wayland-scanner private-code "$1" "${2%.h}-code.h"; }
          # Core Wayland protocol
          gen /usr/share/wayland/wayland.xml wayland-generated/wayland-client-protocol.h
          # Extension protocols
          gen $WP/stable/xdg-shell/xdg-shell.xml wayland-generated/xdg-shell-client-protocol.h
          gen $WP/unstable/xdg-decoration/xdg-decoration-unstable-v1.xml wayland-generated/xdg-decoration-unstable-v1-client-protocol.h
          gen $WP/stable/viewporter/viewporter.xml wayland-generated/viewporter-client-protocol.h
          gen $WP/unstable/relative-pointer/relative-pointer-unstable-v1.xml wayland-generated/relative-pointer-unstable-v1-client-protocol.h
          gen $WP/unstable/pointer-constraints/pointer-constraints-unstable-v1.xml wayland-generated/pointer-constraints-unstable-v1-client-protocol.h
          gen $WP/unstable/idle-inhibit/idle-inhibit-unstable-v1.xml wayland-generated/idle-inhibit-unstable-v1-client-protocol.h
          gen $WP/staging/xdg-activation/xdg-activation-v1.xml wayland-generated/xdg-activation-v1-client-protocol.h
          gen $WP/staging/fractional-scale/fractional-scale-v1.xml wayland-generated/fractional-scale-v1-client-protocol.h
          ls -la wayland-generated/

      - name: Build aarch64-linux-gnu
        run: zig build -Dtarget=aarch64-linux-gnu

      - name: Package
        run: |
          cd zig-out/lib
          tar -czvf ../../farhorizons_deps_aarch64-linux-gnu.tar.gz farhorizons_deps_aarch64-linux-gnu/

      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-linux-gnu
          path: farhorizons_deps_aarch64-linux-gnu.tar.gz

  build-macos:
    # Both macOS arches build on the Apple Silicon runner. macos-13 (Intel)
    # runners are scarce and being retired, so x86_64 is cross-compiled here
    # instead: clang/cmake cross via -DCMAKE_OSX_ARCHITECTURES, and Zig cross
    # via -Dtarget + --sysroot so Cocoa's framework headers still resolve.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        run: echo "ZIG_VERSION=$(cat .zigversion)" >> $GITHUB_ENV

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install dependencies
        run: |
          brew install ninja cmake

      - name: Clone and build shaderc (both arches)
        run: |
          git clone https://github.com/google/shaderc.git shaderc-src
          cd shaderc-src
          ./utils/git-sync-deps
          for pair in "arm64:aarch64-macos-none" "x86_64:x86_64-macos-none"; do
            arch="${pair%%:*}"; tag="${pair##*:}"
            rm -rf build && mkdir build && cd build
            cmake -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES=$arch \
              -DSHADERC_SKIP_TESTS=ON \
              -DSHADERC_SKIP_EXAMPLES=ON \
              -DSHADERC_SKIP_COPYRIGHT_CHECK=ON \
              -DSPIRV_SKIP_TESTS=ON \
              -DSPIRV_WERROR=OFF \
              ..
            ninja
            mkdir -p ../../shaderc/lib/$tag
            cp libshaderc/libshaderc_combined.a ../../shaderc/lib/$tag/
            cd ..
          done

      - name: Clone and build FastNoise2 (both arches)
        run: |
          git clone --depth 1 https://github.com/Auburn/FastNoise2.git fastnoise2-src
          cd fastnoise2-src
          for pair in "arm64:aarch64-macos-none" "x86_64:x86_64-macos-none"; do
            arch="${pair%%:*}"; tag="${pair##*:}"
            rm -rf build && mkdir build && cd build
            cmake -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES=$arch \
              -DBUILD_SHARED_LIBS=OFF \
              -DFASTNOISE2_TESTS=OFF \
              -DFASTNOISE2_TOOLS=OFF \
              ..
            ninja FastNoise
            mkdir -p ../../fastnoise2/lib/$tag
            cp Release/lib/libFastNoise.a ../../fastnoise2/lib/$tag/
            cd ..
          done

      - name: Download universal MoltenVK
        run: |
          # Official MoltenVK release ships a universal (arm64+x86_64) dylib,
          # so the same file serves both tarballs. Homebrew only bottles the
          # host arch, which would leave Intel users without a usable dylib.
          curl -fL -o mvk.tar https://github.com/KhronosGroup/MoltenVK/releases/latest/download/MoltenVK-macos.tar
          mkdir mvk && tar -xf mvk.tar -C mvk
          MVK=$(find mvk -name libMoltenVK.dylib | head -1)
          echo "Found MoltenVK: $MVK"; lipo -info "$MVK"
          cp "$MVK" libMoltenVK.dylib
          install_name_tool -id @rpath/libMoltenVK.dylib libMoltenVK.dylib

      - name: Build, bundle and package (both arches)
        run: |
          SDK=$(xcrun --show-sdk-path)
          # arm64: native build (no -Dtarget so the SDK is auto-detected).
          # x86_64: cross-compile; --sysroot points Zig at the macOS SDK so
          # Cocoa framework headers resolve under the foreign target.
          for pair in "aarch64-macos-none:" "x86_64-macos-none:-Dtarget=x86_64-macos-none --sysroot $SDK"; do
            tag="${pair%%:*}"; flags="${pair#*:}"
            zig build $flags
            DEST=zig-out/lib/farhorizons_deps_$tag
            cp libMoltenVK.dylib "$DEST/"
            cd zig-out/lib
            tar -czvf ../../farhorizons_deps_$tag.tar.gz farhorizons_deps_$tag/
            cd ../..
          done
          find . -maxdepth 1 -name '*.tar.gz'

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: farhorizons_deps_*-macos-none.tar.gz

  release:
    needs: [build-headers, build-windows, build-linux-x86_64, build-linux-aarch64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz
